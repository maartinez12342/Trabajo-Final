<section>
    <h2>Solicitar Presupuesto</h2>

    <form>
        <input type="text" placeholder="Nombre" required>
        <input type="email" placeholder="Email" required>
        <input type="tel" placeholder="Teléfono" required>
        <br>
        <br>
        <textarea placeholder="Solicite más información"></textarea>
        <textarea placeholder="Deja un Comentario"></textarea>
        <br>
        <p>Si te interesa unirte a nuestro equipo sube tu CV AQUI</p>
        <label for="archivo" style="margin-top: 10px; font-weight: bold; color: var(--cian-fondo);">
        Adjuntar archivo (PDF, JPG, PNG):
        </label>
        <input type="file" id="archivo" name="archivo" accept=".pdf, .jpg, .png">
        <br>
        <label>
            <input type="checkbox" required> Acepto la política de privacidad
        </label>
        <br>
        <button type="submit">Enviar</button>
        <br>
    </form>
          <p> <img src="../img/Presupuesto.jpg" alt="Para realizar un presupuesto necesitamos una buena imagen" width="300" ></p>
